<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IA Agent Login</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <p id="login-page-title" class="console-title">IA AGENT LOGIN</p>

      <div class="auth-toolbar">
        <div id="login-language-toggle" class="language-toggle" role="group" aria-label="Language selector">
          <button type="button" class="select-pill language-pill active" data-language="pt">PT</button>
          <button type="button" class="select-pill language-pill" data-language="en">EN</button>
          <button type="button" class="select-pill language-pill" data-language="es">ES</button>
        </div>
        <button type="button" id="login-theme-toggle" class="theme-toggle">THEME: DARK</button>
      </div>

      <form id="login-form" class="auth-form">
        <label id="login-username-label" class="composer-label" for="login-username">USUARIO</label>
        <input id="login-username" type="text" name="username" value="manuel" autocomplete="username" required>

        <label id="login-password-label" class="composer-label" for="login-password">SENHA</label>
        <input id="login-password" type="password" name="password" value="123" autocomplete="current-password" required>

        <button type="submit" id="login-submit" class="submit-button">ENTRAR</button>
        <p id="login-status" class="status-line"></p>
      </form>
    </section>
  </main>

  <script src="/assets/login.js"></script>
</body>
</html>
